<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGGR · Daily Holdings Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --border:    #1e2535;
      --text:      #c8d0e0;
      --muted:     #4a5568;
      --accent:    #3b82f6;
      --green:     #22c55e;
      --green-bg:  rgba(34,197,94,0.08);
      --red:       #ef4444;
      --red-bg:    rgba(239,68,68,0.08);
      --yellow:    #f59e0b;
      --yellow-bg: rgba(245,158,11,0.07);
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .logo-ticker {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.06em;
    }
    .logo-name {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .date-badge {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
